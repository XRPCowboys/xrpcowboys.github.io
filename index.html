
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XRPCOWBOYS • Exclusive XRP Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #0a0a0a;
      color: #e8e0d0;
      margin: 0;
    }

    /* ── Background ── */
    .site-bg {
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(30,60,25,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 50% 100%, rgba(20,40,15,0.4) 0%, transparent 70%),
        #0a0a0a;
    }

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(180,150,60,0.18);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f5d060 0%, #c9921a 50%, #e8b84b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-links a {
      color: rgba(232,224,208,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #f5d060; }

    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #f5d060;
      border-radius: 2px;
      transition: all 0.3s;
    }
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(10,10,10,0.97);
      border-top: 1px solid rgba(180,150,60,0.15);
      padding: 1rem 1.5rem 1.5rem;
      gap: 1rem;
    }
    .mobile-menu a {
      color: rgba(232,224,208,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .mobile-menu.open { display: flex; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 6rem 1.5rem 5rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .star-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      opacity: 0.55;
    }
    .star-row span { color: #f5d060; font-size: 1rem; }
    .star-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9921a, transparent);
    }

      font-weight: 900;
      line-height: 0.95;
