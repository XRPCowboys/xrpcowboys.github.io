<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XRPCOWBOYS • Exclusive XRP Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a3a1f 50%, #0a0a0a 100%); }

    .carved-gold {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(145deg, #ffe766 20%, #e8c670 40%, #c9a22e 55%, #a37f1a 75%, #2e7d32 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 8px rgba(0,0,0,0.6), 0 -2px 4px rgba(255,255,200,0.4);
    }

    .photo-card {
      overflow: hidden;
      border-radius: 20px;
    }
    .photo-card img {
      width: 100%;
      height: 280px;           /* fixed height */
      object-fit: cover;       /* this crops nicely without stretching */
      object-position: center; /* focuses on the center */
    }
  </style>
</head>
<body class="hero-bg text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-16">

      <p class="text-xl md:text-2xl text-green-300 max-w-2xl mx-auto">Where it all started... Real holders. Real friends. Real value.</p>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

      <div class="photo-card"><img src="XRPCowboys_files/image03.jpg" alt="XRP Cowboys"></div>
      <div class="photo-card"><img src="XRPCowboys_files/image05.jpg" alt="XRP Cowboys"></div>
      <div class="photo-card"><img src="XRPCowboys_files/davejamesguys.jpg" alt="XRP Cowboys"></div>

      <div class="photo-card"><img src="XRPCowboys_files/ny party.jpg" alt="XRP Cowboys"></div>

</html>
