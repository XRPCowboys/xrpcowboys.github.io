<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XRPCOWBOYS • Exclusive XRP Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero-bg { 
      background: linear-gradient(135deg, #0a0a0a 0%, #1a3a1f 50%, #0a0a0a 100%); 
    }

    /* Carved Gold with Green Etch */
    .carved-gold {
      font-size: 6.2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(145deg, 
        #ffe766 15%, 
        #e8c670 30%, 
        #c9a22e 45%, 
        #a37f1a 60%, 
        #4ade80 78%, 
        #22c55e 92%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 4px 8px rgba(0,0,0,0.65),
        0 -2px 4px rgba(255,255,200,0.45),
        2px 2px 6px rgba(34, 197, 94, 0.5);
    }

    /* Hat icon in top left corner */
    .hat-icon {
      position: fixed;
      top: 20px;
      left: 30px;
      z-index: 50;
      width: 80px;
      height: 80px;
      border-radius: 9999px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }
    .hat-icon:hover {
      transform: scale(1.15);
    }

    /* Strong hover zoom for gallery */
    .photo-card {
      transition: all 0.5s ease;
      overflow: hidden;
      border-radius: 24px;
    }
    .photo-card:hover {
      transform: scale(1.48);
      box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.85);
    }
    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.8s ease;
    }
    .photo-card:hover img {
      transform: scale(1.28);
    }
  </style>
</head>
<body class="hero-bg text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-16">

    <!-- Hat Icon in upper left corner -->
    <img src="XRPCowboys_files/davehat.jpg" alt="XRPCowboys Hat Icon
