<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cowboy Profile | XRPCOWBOYS</title>
  <link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Oswald:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--gold:#f5c842;--gold-dim:#c9921a;--green:#4ade80;--bg:#0a0804;--text:rgba(232,224,208,0.92);--muted:rgba(232,224,208,0.5);--card-bg:rgba(15,12,6,0.85);--card-border:rgba(201,146,26,0.18);--border:rgba(201,146,26,0.15);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Source Serif 4',Georgia,serif;color:var(--text);background:var(--bg);min-height:100vh;}
    .hero-bg{position:fixed;inset:0;z-index:0;background:url('XRPCowboys_files/cemrecan-yurtman-cB2hCETHtlY-unsplash.jpg') center center/cover no-repeat;}
    .hero-bg::after{content:'';position:absolute;inset:0;background:rgba(10,8,4,0.62);}
    
    
    
    
    
    
    
    .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
    .hamburger span{display:block;width:22px;height:1.5px;background:var(--gold);border-radius:2px;}
    .mobile-menu{display:none;flex-direction:column;background:rgba(14,10,3,0.98);border-top:1px solid var(--border);padding:1rem 2rem;gap:1rem;}
    .mobile-menu.open{display:flex;}
    .mobile-menu a{font-family:'Oswald',sans-serif;font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(232,224,208,0.95);text-decoration:none;}
    .page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
    .card{background:rgba(22,16,6,0.78);border:1px solid var(--card-border);backdrop-filter:blur(18px);border-radius:4px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
    .profile-header{display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;}
    .profile-avatar{width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dim);background:rgba(201,146,26,0.15);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;}
    .profile-avatar img{width:110px;height:110px;border-radius:50%;object-fit:cover;}
    .profile-handle{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#fff;margin-bottom:0.2rem;}
    .profile-name{font-family:'Oswald',sans-serif;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(232,224,208,0.80);margin-bottom:0.6rem;}
    .profile-meta{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:0.8rem;}
    .profile-meta span{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,224,208,0.80);display:flex;align-items:center;gap:0.3rem;}
    .profile-bio{font-size:1rem;line-height:1.75;color:var(--text);margin-top:0.8rem;}
    .wallet-box{background:rgba(201,146,26,0.06);border:1px solid var(--card-border);border-radius:2px;padding:0.6rem 1rem;margin-top:0.8rem;font-family:monospace;font-size:0.82rem;color:var(--gold-dim);word-break:break-all;}
    .card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:1.2rem;padding-bottom:0.6rem;border-bottom:1px solid var(--card-border);}
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;}
    .photo-item{aspect-ratio:1;border-radius:3px;overflow:hidden;border:1px solid var(--card-border);}
    .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s;}
    .photo-item img:hover{transform:scale(1.05);}
    .back-link{display:inline-flex;align-items:center;gap:0.5rem;font-family:'Oswald',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dim);text-decoration:none;margin-bottom:1.5rem;transition:color 0.2s;}
    .back-link:hover{color:var(--gold);}
    .not-found{text-align:center;padding:4rem 2rem;color:rgba(232,224,208,0.80);font-style:italic;}
    @media(max-width:768px){
      .nav-links,
      .hamburger{display:flex;}
      .photo-grid{grid-template-columns:repeat(2,1fr);}
      .profile-avatar{width:80px;height:80px;font-size:2rem;}
      .profile-avatar img{width:80px;height:80px;}
    }
  </style>
<script src="shared.js"></script>
</head>
<body>
<div class="hero-bg"></div>
<nav class="nav">
    <div class="nav-inner">
    <a href="index.html" class="nav-logo">&#10022; XRPCOWBOYS</a>
    <ul class="nav-links">
      <li><a href="index.html" id="nav-home">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="dispatch.html">Corral</a></li>
      <li><a href="gallery.html">Gallery</a></li>

      <li><a href="messages.html" class="nav-login-btn" id="nav-messages-btn" style="display:none">Messages</a></li>
      <li><a href="profile.html" class="nav-login-btn" id="nav-profile-btn" style="display:none">My Profile</a></li>
      <li><a href="login.html" class="nav-login-btn" id="nav-login-btn">Login</a></li>
      <li><a href="join.html" class="nav-join-btn" id="nav-join-btn">Join</a></li>
      <li><a href="#" class="nav-join-btn" id="nav-logout-btn" style="display:none" onclick="handleLogout(event)">Log Out</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
    <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="toggleMenu()">Home</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
    <a href="dispatch.html" onclick="toggleMenu()">Corral</a>
    <a href="gallery.html" onclick="toggleMenu()">Gallery</a>

    <a href="profile.html" onclick="toggleMenu()" id="mob-profile-btn" style="display:none">My Profile</a>
    <a href="login.html" onclick="toggleMenu()" id="mob-login-btn">Login</a>
    <a href="join.html" onclick="toggleMenu()" class="mob-join" id="mob-join-btn">&#10022; Join the Community</a>
    <a href="#" onclick="handleLogout(event);toggleMenu();" class="mob-join" id="mob-logout-btn" style="display:none">&#10022; Log Out</a>
  </div>
</nav>

<div class="page" id="page-content">
  <a href="members.html" class="back-link">← Back to The Posse</a>
  <div id="profile-content"><p class="not-found">Loading profile...</p></div>
</div>

<script>
const SUPABASE_URL='https://fbngrpissakvjelrcfaf.supabase.co';
const SUPABASE_KEY='sb_publishable__lAiK0hWnTs6gr7BSL8qAQ_40zk3KLU';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const userId=params.get('id');
  if(!userId){document.getElementById('profile-content').innerHTML='<p class="not-found">No profile specified.</p>';return;}

  const{data:profile}=await sb.from('profiles').select('*').eq('id',userId).single();
  if(!profile){document.getElementById('profile-content').innerHTML='<p class="not-found">Profile not found or is private.</p>';return;}

  document.title=`${profile.handle||'Cowboy'} | XRPCOWBOYS`;

  const{data:photos}=await sb.from('member_photos').select('*').eq('user_id',userId).order('created_at',{ascending:false});

  document.getElementById('profile-content').innerHTML=`
    <div class="card">
      <div class="profile-header">
        <div class="profile-avatar">
          ${profile.avatar_url?`<img src="${esc(profile.avatar_url)}">`:'🤠'}
        </div>
        <div style="flex:1;">
          <h1 class="profile-handle">${esc(profile.handle||'Cowboy')}</h1>
          ${profile.full_name?`<div class="profile-name">${esc(profile.full_name)}</div>`:''}
          <div class="profile-meta">
            ${profile.location?`<span>📍 ${esc(profile.location)}</span>`:''}
            <span>🗓 Riding since ${profile.joined_at?new Date(profile.joined_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}):'-'}</span>
          </div>
          ${profile.bio?`<p class="profile-bio">${esc(profile.bio)}</p>`:''}
          ${profile.xrp_wallet?`<div class="wallet-box">💳 ${esc(profile.xrp_wallet)}</div>`:''}
          <a href="messages.html?to=${userId}" style="display:inline-block;margin-top:1rem;background:linear-gradient(135deg,#f5d060,#c9921a);color:#080808;font-family:'Oswald',sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:0.6rem 1.5rem;border-radius:999px;text-decoration:none;">✉ Send Message</a>
        </div>
      </div>
    </div>
    ${photos&&photos.length>0?`
    <div class="card">
      <div class="card-title">📸 Photos</div>
      <div class="photo-grid">
        ${photos.map(p=>`<div class="photo-item"><img src="${esc(p.photo_url)}" loading="lazy"></div>`).join('')}
      </div>
    </div>`:''}
  `;
}

init();
</script>
</body>
</html>
