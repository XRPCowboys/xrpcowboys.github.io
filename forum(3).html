<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Corral | XRPCOWBOYS • Hot Topics</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:wght@300;400;600&family=Oswald:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5d060; --gold-dim: #c9921a; --gold-dark: #a06e10;
      --green: #4ade80; --cream: #e8e0d0; --bg: #080808;
      --border: rgba(180,150,60,0.18);
      --card-bg: rgba(10,8,4,0.82); --card-border: rgba(201,168,76,0.25);
      --text: #f0e8d5; --muted: #a89878;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Source Serif 4', Georgia, serif; color: var(--text); background: var(--bg); min-height: 100vh; }
    .hero-bg { position: fixed; inset: 0; z-index: 0; background: url('XRPCowboys_files/background picture.jpg') center center / cover no-repeat; background-attachment: scroll; }
    .hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,8,4,0.55) 0%, rgba(10,8,4,0.45) 40%, rgba(10,8,4,0.70) 80%, rgba(10,8,4,0.92) 100%); }
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 900; letter-spacing: 0.1em; background: linear-gradient(120deg, #ffe87a, #c9921a, #f5d060); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Oswald', sans-serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(232,224,208,0.9); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-login-btn { font-family: 'Oswald', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(232,224,208,0.95) !important; border: 1px solid rgba(180,150,60,0.4); padding: 0.45rem 1.1rem; border-radius: 999px; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
    .nav-login-btn:hover { border-color: var(--gold); color: var(--gold) !important; }
    .nav-join-btn { background: linear-gradient(135deg, #f5d060, #c9921a) !important; color: #080808 !important; padding: 6px 18px; border-radius: 999px; font-weight: 600 !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: var(--gold); border-radius: 2px; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(8,8,8,0.98); border-top: 1px solid var(--border); padding: 1rem 2rem; gap: 1rem; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Oswald', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(232,224,208,0.95); text-decoration: none; }
    .mobile-menu .mob-join { color: var(--gold) !important; font-weight: 500; }
    .page-wrap { position: relative; z-index: 10; }
    .page-header { text-align: center; padding: 4rem 1.5rem 2.5rem; }
    .page-header .eyebrow { font-family: 'Oswald', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green); margin-bottom: 0.8rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 900; line-height: 1; letter-spacing: 0.04em; background: linear-gradient(150deg, #ffe87a 0%, #f5c842 18%, #c9921a 42%, #a06e10 58%, #4ade80 76%, #22c55e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page-header .sub { margin-top: 0.9rem; color: var(--muted); font-size: 1rem; font-style: italic; }
    .content { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 6rem; }
    .section-label { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.4rem; }
    .section-label h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; }
    .section-label .line { flex: 1; height: 1px; background: var(--card-border); }
    .hot-topics { margin-bottom: 2.5rem; }
    .hot-topic-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 1.2rem; background: var(--card-bg); border: 1px solid var(--card-border); border-left: 3px solid var(--gold-dim); backdrop-filter: blur(8px); margin-bottom: 0.6rem; border-radius: 2px; text-decoration: none; color: var(--text); transition: background 0.2s, border-color 0.2s; }
    .hot-topic-item:hover { background: rgba(201,168,76,0.08); border-left-color: var(--gold); }
    .hot-topic-flame { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
    .hot-topic-text .tag { font-family: 'Oswald', sans-serif; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.2rem; }
    .hot-topic-text strong { font-size: 0.95rem; font-weight: 600; color: #fff; line-height: 1.35; display: block; }
    .featured-box { background: var(--card-bg); border: 1px solid var(--gold-dim); backdrop-filter: blur(12px); border-radius: 3px; overflow: hidden; margin-bottom: 3rem; box-shadow: 0 8px 48px rgba(0,0,0,0.5); text-decoration: none; display: block; transition: transform 0.2s, box-shadow 0.2s; }
    .featured-box:hover { transform: translateY(-2px); box-shadow: 0 12px 56px rgba(0,0,0,0.6); }
    .featured-box-inner { padding: 2rem 2.2rem; }
    .featured-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: linear-gradient(135deg, #f5d060, #c9921a); color: #080808; font-family: 'Oswald', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.3rem 0.75rem; border-radius: 999px; margin-bottom: 1.2rem; }
    .featured-box h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 900; color: #fff; line-height: 1.2; margin-bottom: 0.8rem; }
    .featured-box h2 em { color: var(--gold); font-style: italic; }
    .featured-box p { color: var(--muted); font-size: 0.95rem; line-height: 1.65; margin-bottom: 1.4rem; }
    .featured-meta { display: flex; flex-wrap: wrap; gap: 1.2rem; font-family: 'Oswald', sans-serif; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; border-top: 1px solid var(--card-border); padding-top: 1rem; margin-top: 0.5rem; }
    .featured-meta span { display: flex; align-items: center; gap: 0.3rem; }
    .read-more { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--gold); font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.2rem; }
    .articles-grid { display: grid; gap: 1px; border: 1px solid var(--card-border); background: var(--card-border); border-radius: 3px; overflow: hidden; }
    .article-card { background: var(--card-bg); backdrop-filter: blur(8px); padding: 1.4rem 1.6rem; text-decoration: none; display: block; transition: background 0.18s; }
    .article-card:hover { background: rgba(201,168,76,0.07); }
    .article-card .tag { font-family: 'Oswald', sans-serif; font-size: 0.67rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.4rem; }
    .article-card h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.35; margin-bottom: 0.45rem; }
    .article-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.55; margin-bottom: 0.6rem; }
    .article-card .meta { font-family: 'Oswald', sans-serif; font-size: 0.72rem; color: rgba(168,152,120,0.6); letter-spacing: 0.05em; }
    footer { position: relative; z-index: 10; background: rgba(4,3,1,0.88); border-top: 1px solid var(--border); padding: 3rem 2rem 2rem; backdrop-filter: blur(8px); }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 2rem; margin-bottom: 2rem; }
    .footer-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 900; background: linear-gradient(120deg, #ffe87a, #c9921a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; }
    .footer-tagline { font-family: 'Oswald', sans-serif; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(232,224,208,0.7); }
    .footer-links { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .footer-links a { font-family: 'Oswald', sans-serif; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(232,224,208,0.85); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom { max-width: 1100px; margin: 0 auto; border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: center; }
    .footer-bottom p { font-family: 'Oswald', sans-serif; font-size: 0.65rem; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(232,224,208,0.6); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .hero-bg { background-size: 400% auto; background-position: 40% top; background-attachment: scroll; }
      .featured-box-inner { padding: 1.4rem 1.2rem; }
      .page-header { padding: 2.5rem 1rem 1.5rem; }
      .content { padding: 0 1rem 4rem; }
    }
    @media (max-width: 480px) {
      .hero-bg { background-size: 500% auto; background-position: 35% top; background-attachment: scroll; }
    }

  </footer>
